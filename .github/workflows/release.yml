name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (example: 1.0.0)"
        required: true
        default: "0.1.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/release.ps1 -Version "${{ github.event.inputs.version }}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: truba-client-gui-${{ github.event.inputs.version }}
          path: |
            dist/*.zip
            dist/*.sha256
