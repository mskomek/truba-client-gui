name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (example: 1.0.0)"
        required: true
        default: "0.1.0"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/release.ps1 -Version "${{ github.event.inputs.version }}"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body_path: dist/CHANGELOG_v${{ github.event.inputs.version }}.md
          files: |
            dist/CHANGELOG_v${{ github.event.inputs.version }}.md
            dist/truba-client-gui_v${{ github.event.inputs.version }}_windows.exe
            dist/truba-client-gui_v${{ github.event.inputs.version }}_windows_onedir.zip
            dist/truba-client-gui_v${{ github.event.inputs.version }}_windows_onedir.zip.sha256
