name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall src/truba_gui
      - name: i18n drift gate
        run: python scripts/check_i18n.py
      - name: Smoke test
        run: PYTHONPATH=src python scripts/smoke_test.py
